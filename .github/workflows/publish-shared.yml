name: Publish Shared Library

on:
  push:
    branches: [main]

# REQUIRED: GITHUB_TOKEN must be explicitly granted packages:write
# to publish to the GitHub Package Registry under an organisation scope.
# Without this declaration the default token is read-only → E403.
permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@area-51-devops'

      - name: Install dependencies
        run: npm ci

      - name: Check if version already published
        id: version_check
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          PKG_NAME=$(node -p "require('./package.json').name")
          echo "version=${PKG_VERSION}" >> $GITHUB_OUTPUT
          if npm view "${PKG_NAME}@${PKG_VERSION}" --registry https://npm.pkg.github.com > /dev/null 2>&1; then
            echo "already_published=true" >> $GITHUB_OUTPUT
            echo "Version ${PKG_VERSION} already published — skipping."
          else
            echo "already_published=false" >> $GITHUB_OUTPUT
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish package
        if: steps.version_check.outputs.already_published == 'false'
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
