name: Common_CI

on:
  workflow_call:
    inputs:
      working_directory:
        required: true
        type: string

      image_name:
        required: true
        type: string

      run_build:
        required: false
        type: boolean
        default: false

      sonar_project_key:
        required: false
        type: string
        default: 'NexusBank'

      docker_context:
        required: false
        type: string
        default: 'services'

      dockerfile_path:
        required: false
        type: string
        default: ''

      service-name:
        required: true
        type: string

    secrets:
      SONAR_TOKEN:
        required: true
      SONAR_HOST_URL:
        required: true
      SNYK_TOKEN:
        required: true
      DOCKER_USERNAME:
        required: true
      DOCKER_PASSWORD:
        required: true
      SMTP_HOST:
        required: true
      SMTP_PORT:
        required: true
      SMTP_USERNAME:
        required: true
      SMTP_PASSWORD:
        required: true
      EMAIL_TO:
        required: true

jobs:
  build:
    name: "CI - ${{ inputs.service-name }}"
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # Required by github-tag-action to read full git history

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles(format('{0}/package-lock.json', inputs.working_directory)) }}
          restore-keys: |
            ${{ runner.os }}-npm-

      # -------- TAGGING STRATEGY ----------------------------------------
      # main branch  → semantic version (vX.Y.Z)  — pushed to registry
      # other branch → sha-XXXXXXX                — built & scanned ONLY, NOT pushed
      # ------------------------------------------------------------------

      - name: Calculate Semantic Version (main only)
        id: semver
        if: github.ref == 'refs/heads/main'
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ github.token }}
          dry_run: true
          default_bump: patch
          tag_prefix: 'v'

      - name: Resolve Image Tag
        id: image_tag
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "tag=${{ steps.semver.outputs.new_tag }}" >> $GITHUB_OUTPUT
            echo "push=true"                               >> $GITHUB_OUTPUT
          else
            SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
            echo "tag=sha-${SHORT_SHA}"                    >> $GITHUB_OUTPUT
            echo "push=false"                              >> $GITHUB_OUTPUT
          fi

      # -------- SETUP NODE & REGISTRY -----------------------------------
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@area-51-devops'

      # -------- INSTALL (moved before Sonar so scan has full context) ---
      - name: Install dependencies
        run: npm ci
        env:
          NODE_AUTH_TOKEN: ${{ github.token }}

      # -------- TEST ----------------------------------------------------
      - name: Run Tests
        run: npm test

      # -------- SONAR ---------------------------------------------------
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v6
        with:
          projectBaseDir: ${{ inputs.working_directory }}
          args: >
            -Dsonar.projectKey=${{ inputs.sonar_project_key }}
            -Dsonar.projectName=NexusBank
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      - name: SonarQube Quality Gate
        uses: SonarSource/sonarqube-quality-gate-action@v1
        with:
          scanMetadataReportFile: ${{ inputs.working_directory }}/.scannerwork/report-task.txt
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        # NOTE: continue-on-error removed — a failing gate now blocks the pipeline

      # -------- SNYK (pre-build, position kept per requirement) ---------
      - name: Snyk Scan
        uses: snyk/actions/node@0.4.0
        with:
          command: test
          args: --file=${{ inputs.working_directory }}/package.json --severity-threshold=high
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        # NOTE: no continue-on-error — HIGH/CRITICAL vulns now fail the pipeline

      # -------- BUILD (frontend only) -----------------------------------
      - name: Build
        if: inputs.run_build == true
        run: npm run build

      # -------- DOCKER BUILD --------------------------------------------
      - name: Docker Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        working-directory: ${{ inputs.docker_context }}
        run: |
          DOCKERFILE="${{ inputs.dockerfile_path }}"
          if [ -z "$DOCKERFILE" ]; then
            DOCKERFILE="${{ inputs.image_name }}/Dockerfile"
          fi
          docker build \
            -f "$DOCKERFILE" \
            -t ${{ secrets.DOCKER_USERNAME }}/${{ inputs.service-name }}:${{ steps.image_tag.outputs.tag }} \
            .

      # -------- TRIVY (runs BEFORE push — a failure blocks the push) -----
      - name: Trivy Security Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ secrets.DOCKER_USERNAME }}/${{ inputs.service-name }}:${{ steps.image_tag.outputs.tag }}'
          format: table
          exit-code: '1'
          ignore-unfixed: true
          severity: HIGH,CRITICAL

      # -------- PUSH (main only, after Trivy passes) --------------------
      - name: Push Docker Image (semver + latest)
        if: steps.image_tag.outputs.push == 'true'
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/${{ inputs.service-name }}:${{ steps.image_tag.outputs.tag }}
          docker tag  ${{ secrets.DOCKER_USERNAME }}/${{ inputs.service-name }}:${{ steps.image_tag.outputs.tag }} \
                      ${{ secrets.DOCKER_USERNAME }}/${{ inputs.service-name }}:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/${{ inputs.service-name }}:latest

      - name: Create Git Tag (main only)
        if: steps.image_tag.outputs.push == 'true'
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ github.token }}
          custom_tag: ${{ steps.semver.outputs.new_tag }}
          tag_prefix: ''

      # -------- EMAIL NOTIFICATION --------------------------------------
      - name: Send Email (Success)
        if: success() && github.ref == 'refs/heads/main'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_HOST }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "CI Success - ${{ inputs.service-name }} ${{ steps.image_tag.outputs.tag }}"
          body: |
            Build Successful

            Service:      ${{ inputs.service-name }}
            Tag:          ${{ steps.image_tag.outputs.tag }}
            Image:        ${{ secrets.DOCKER_USERNAME }}/${{ inputs.service-name }}:${{ steps.image_tag.outputs.tag }}
            Repository:   ${{ github.repository }}
            Workflow:     ${{ github.workflow }}
            Triggered By: ${{ github.actor }}
          to: ${{ secrets.EMAIL_TO }}
          from: GitHub Actions

      - name: Send Email (Failure)
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_HOST }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "CI Failed - ${{ inputs.service-name }} - Run #${{ github.run_number }}"
          body: |
            CI Pipeline Execution Failed

            Service:       ${{ inputs.service-name }}
            Tag Attempted: ${{ steps.image_tag.outputs.tag }}
            Repository:    ${{ github.repository }}
            Workflow:      ${{ github.workflow }}

            Event Type:    ${{ github.event_name }}
            Branch:        ${{ github.ref_name }}
            Triggered By:  ${{ github.actor }}

            Logs:
            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          to: ${{ secrets.EMAIL_TO }}
          from: GitHub Actions
